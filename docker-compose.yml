services:
  remnawave-minishop:
    image: ghcr.io/3252a8/remnawave-minishop:${IMAGE_TAG:-latest}
    container_name: remnawave-minishop
    hostname: remnawave-minishop
    env_file:
      - .env
    networks:
      - remnawave-network
    restart: unless-stopped
    depends_on:
      remnawave-minishop-db:
        condition: service_healthy
    ports:
      - 127.0.0.1:8080:8080
      - 127.0.0.1:${WEBAPP_SERVER_PORT:-8081}:${WEBAPP_SERVER_PORT:-8081}
    # Optional Tariffs 2.0 config. Put tariffs.json near this compose file,
    # then uncomment the mount below. If no JSON is mounted, legacy .env
    # pricing is used.
    # volumes:
    #   - ./tariffs.json:/app/config/tariffs.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  remnawave-minishop-db:
    image: postgres:17
    container_name: remnawave-minishop-db
    hostname: remnawave-minishop-db
    env_file:
      - .env
    volumes:
      - remnawave-minishop-db-data:/var/lib/postgresql/data
    networks:
      - remnawave-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

networks:
  remnawave-network:
    external: true

volumes:
  remnawave-minishop-db-data:
    name: remnawave-minishop-db-data
